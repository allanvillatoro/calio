name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality-check:
    runs-on: ubuntu-24.04

    env:
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type-check
        run: npm run build

      - name: Run linter (ESLint)
        run: npm run lint

      - name: Run Prettier
        run: npm run format:check

      - name: Run unit tests
        run: npm run test:coverage
