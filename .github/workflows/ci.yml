name: CI

on:
  push:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read

jobs:
  quality-check:
    runs-on: ubuntu-24.04

    env:
      DB_TARGET: "testing"
      TEST_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/calio_ci"
      JWT_SECRET: "ci-only-jwt-secret"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: "ci-cloud"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run type-check
        run: npm run build

      - name: Run linter (ESLint)
        run: npm run lint

      - name: Run Prettier
        run: npm run format:check

      - name: Run unit tests
        run: npm run test:coverage
